schema: spec-driven

context: |
  Tech stack: Kotlin 2.3.10 + Compose Multiplatform 1.8.0 + Gradle, targeting Android, iOS, and JVM.
  Modules:
    - composeApp: Compose Multiplatform UI, Ktor 3.4.1 HTTP client, SQLDelight 2.3.1 local DB, Koin 4.1.0 DI.
    - shared: @Serializable cross-module contracts (User, Course, Lesson, Exercise, UserProgress).
    - server: Ktor Netty backend, Exposed 1.1.1 ORM, Flyway 10.22.0 migrations, PostgreSQL, JWT auth, bcrypt.
    - iosApp: Native Swift/Xcode entrypoint (no KMP logic).
    - admin-web: React 18 + TypeScript + Vite 6 admin panel (no test infrastructure yet).
  Domain: Gamified math learning for Argentina primary/secondary levels with teacher-managed classes.
  Testing: kotlin.test across commonTest/jvmTest/androidUnitTest (app, 92 tests), Ktor testApplication + H2 (server, 59 tests).
  Style: Kotlin official code style, JVM 17, Gradle config cache + build cache enabled.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    instructions:
      - Follow existing code patterns and conventions
    tdd: false
    test_command: "./gradlew :composeApp:jvmTest"
  verify:
    test_command: "./gradlew :server:test :composeApp:jvmTest"
    build_command: "./gradlew :composeApp:assembleDebug"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: false
  note: "strict_tdd disabled by openspec/config.yaml. Test runner exists (kotlin.test) so default would be true, but project convention is non-strict."
  framework: kotlin.test
  runners:
    server:
      command: "./gradlew :server:test"
      tests: 59
      layers:
        unit: true
        integration: true
        e2e: false
    composeApp:
      command: "./gradlew :composeApp:jvmTest"
      tests: 92
      layers:
        unit: true
        integration: true
        e2e: false
    admin_web:
      command: null
      tests: 0
      note: "No test runner configured in package.json"
  coverage: false
  quality:
    linter: false
    type_checker: true
    formatter: false
