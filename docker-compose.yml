services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: MathimApp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mathimapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d MathimApp"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  postgres_data:
